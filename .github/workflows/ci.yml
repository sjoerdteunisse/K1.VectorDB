name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore K1.VectorDB.sln

      - name: Build
        run: dotnet build K1.VectorDB.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test K1.VectorDB.sln --no-build --configuration Release --verbosity normal --filter "Category!=E2E"
